<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upper Limb Anatomy Test</title>
  <style>
    /* ── Design Tokens ── */
    :root {
      --bg: oklch(0.98 0.01 240);
      --surface: oklch(1 0 0);
      --ink: oklch(0.2 0.02 240);
      --ink-muted: oklch(0.5 0.02 240);
      --accent: oklch(0.5 0.18 245);
      --accent-soft: oklch(0.95 0.02 245);
      --success: oklch(0.55 0.15 150);
      --success-soft: oklch(0.96 0.03 150);
      --error: oklch(0.55 0.18 25);
      --error-soft: oklch(0.96 0.03 25);
      --radius: 12px;
      --shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05), 0 1px 3px 0 rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--ink);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      padding: 4rem 1rem 8rem;
    }

    /* ── Layout ── */
    .container {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* ── Header ── */
    .header-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 3rem 2.5rem 2.5rem;
      box-shadow: var(--shadow);
      border-top: 6px solid var(--accent);
      position: relative;
      overflow: hidden;
    }

    .header-card::after {
      content: "";
      position: absolute;
      top: 0; right: 0;
      width: 150px; height: 150px;
      background: var(--accent);
      opacity: 0.03;
      border-radius: 50%;
      transform: translate(50%, -50%);
    }

    .header-card h1 {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin-bottom: 0.5rem;
      color: var(--ink);
    }

    .header-card .meta {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--ink-muted);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .meta span::after { content: "•"; margin-left: 0.75rem; opacity: 0.3; }
    .meta span:last-child::after { content: none; }

    .required-note {
      margin-top: 1.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--error);
      background: var(--error-soft);
      padding: 0.75rem 1rem;
      border-radius: 6px;
      display: inline-block;
    }

    /* ── Question Cards ── */
    .question-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 2rem 2.5rem;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: relative;
    }

    .question-card:hover { box-shadow: var(--shadow-lg); }

    .type-label {
      font-size: 0.625rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      margin-bottom: 1.25rem;
      display: inline-block;
    }

    .type-mcq   { background: oklch(0.9 0.05 245);  color: oklch(0.4 0.15 245); }
    .type-short { background: oklch(0.92 0.05 150);  color: oklch(0.35 0.15 150); }
    .type-essay { background: oklch(0.92 0.05 30);   color: oklch(0.35 0.15 30); }

    .question-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 2rem;
      margin-bottom: 1.5rem;
    }

    .question-text {
      font-size: 1.125rem;
      font-weight: 500;
      color: var(--ink);
      line-height: 1.5;
    }

    .question-text strong { color: var(--accent); margin-right: 0.5rem; }

    .marks-badge {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--ink-muted);
      background: var(--bg);
      padding: 0.25rem 0.625rem;
      border-radius: 4px;
      white-space: nowrap;
    }

    /* ── MCQ Options ── */
    .options { display: flex; flex-direction: column; gap: 0.75rem; }

    .option-label {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      border: 1px solid oklch(0.9 0 0);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9375rem;
      transition: all 0.2s ease;
    }

    .option-label:hover { background: var(--bg); border-color: var(--accent); }

    .option-label input[type="radio"] {
      width: 1.25rem;
      height: 1.25rem;
      accent-color: var(--accent);
    }

    /* ── Answer highlighting (review mode) ── */
    .opt-correct { background: var(--success-soft) !important; border-color: var(--success) !important; font-weight: 600; }
    .opt-wrong   { background: var(--error-soft)   !important; border-color: var(--error)   !important; }

    /* ── Text Inputs ── */
    .short-input, .essay-input {
      width: 100%;
      border: 1px solid oklch(0.9 0 0);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      font-size: 1rem;
      font-family: inherit;
      color: var(--ink);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      background: var(--bg);
    }

    .short-input:focus, .essay-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
      background: var(--surface);
    }

    .essay-input { min-height: 160px; resize: vertical; }

    /* ── Submit button ── */
    .submit-section { display: flex; flex-direction: column; align-items: center; gap: 1rem; margin-top: 2rem; }

    .btn-submit {
      background: var(--accent);
      color: white;
      border: none;
      padding: 1.25rem 3rem;
      border-radius: 9999px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 14px 0 oklch(0.5 0.15 245 / 0.3);
    }

    .btn-submit:hover:not(:disabled) {
      background: oklch(0.45 0.18 245);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px 0 oklch(0.5 0.15 245 / 0.4);
    }
    
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Review banner ── */
    .review-banner {
      background: var(--success-soft);
      color: var(--success);
      padding: 1.5rem 2rem;
      border-radius: var(--radius);
      border-left: 4px solid var(--success);
      width: 100%;
      margin-bottom: 2rem;
    }

    .review-banner strong { display: block; font-size: 1.125rem; margin-bottom: 0.25rem; }

    .answer-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--ink-muted);
      margin-bottom: 0.5rem;
      margin-top: 2rem;
    }

    .answer-display {
      background: var(--bg);
      padding: 1.25rem 1.5rem;
      border-radius: 8px;
      font-size: 1rem;
      color: var(--ink);
      border: 1px solid oklch(0.9 0 0);
    }

    .answer-display em { color: var(--ink-muted); font-style: italic; }

    /* ── Pagination bar ── */
    .pagination-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 1rem 0;
    }

    .btn-page {
      background: var(--surface);
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0.5rem 1.25rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .btn-page:hover:not(:disabled) { background: var(--accent); color: white; }
    .btn-page:disabled { opacity: 0.35; cursor: not-allowed; }

    .page-indicator {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--ink-muted);
      min-width: 90px;
      text-align: center;
    }

    /* ── Progress bar (sticky footer) ── */
    .progress-footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid oklch(0.92 0 0);
      padding: 0.625rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      z-index: 100;
      box-shadow: 0 -2px 8px rgb(0 0 0 / 0.06);
    }

    .progress-track {
      flex: 1;
      height: 6px;
      background: oklch(0.92 0 0);
      border-radius: 9999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 9999px;
      transition: width 0.3s ease;
    }

    .progress-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--ink-muted);
      white-space: nowrap;
    }

    /* ── Save indicator ── */
    .save-toast {
      position: fixed;
      bottom: 4rem; right: 1.5rem;
      background: var(--ink);
      color: white;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 200;
    }

    .save-toast.visible { opacity: 1; }

    /* ── Session panel ── */
    .session-bar {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 1.25rem;
    }

    .btn-session {
      background: var(--bg);
      color: var(--ink-muted);
      border: 1px solid oklch(0.88 0 0);
      padding: 0.45rem 1rem;
      border-radius: 9999px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-session:hover { border-color: var(--accent); color: var(--accent); }

    .session-list {
      margin-top: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .session-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0.875rem;
      background: var(--bg);
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      border: 1px solid oklch(0.9 0 0);
      transition: border-color 0.2s;
    }

    .session-item:hover { border-color: var(--accent); }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      body { padding: 2rem 1rem 4rem; }
      .header-card, .question-card { padding: 1.5rem; }
      .header-card h1 { font-size: 1.75rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-card">
      <h1>Upper Limb Anatomy</h1>
      <div class="meta">
        <span>Anatomy Questions</span>
        <span>83 Questions</span>
        <span>Mixed Difficulty</span>
      </div>
      <div class="session-bar">
        <button class="btn-session" id="btn-save-session">Save Session</button>
        <button class="btn-session" id="btn-load-session">Manage Sessions</button>
      </div>
      <div id="session-panel" style="display:none;">
        <div class="session-list" id="session-list"></div>
      </div>
    </div>

    <div id="review-banner-container"></div>
    <div id="questions-container"></div>

    <div class="pagination-bar" id="pagination-bar">
      <button class="btn-page" id="btn-prev" disabled>← Previous</button>
      <div class="page-indicator" id="page-indicator">Page 1 of 5</div>
      <button class="btn-page" id="btn-next">Next →</button>
    </div>

    <div class="submit-section" id="submit-section">
      <button class="btn-submit" id="btn-submit">Submit Test</button>
      <button class="btn-session" id="btn-retake" style="display:none; margin-top: 1rem;">Retake Test</button>
    </div>
  </div>

  <div class="progress-footer">
    <div class="progress-label" id="progress-label">0 / 83 answered</div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width: 0%;"></div>
    </div>
  </div>

  <div class="save-toast" id="save-toast">Saved ✓</div>

  <script>
    /*
     * Generated from: anatomy questions.pdf
     * Topic: Upper Limb Anatomy
     * Mode: Parsed from file
     * Difficulty: Final-year Medical Student
     * Total marks: 83
     * Questions: 83
     * Pages: 5
     */

    const questions = [
  {
    "id": 1,
    "type": "mcq",
    "text": "Which of the following is NOT true regarding the clavicle?",
    "options": [
      "(A) Its medial end is enlarged where it attaches to the sternum.",
      "(B) Its lateral end is flat where it articulates with the humerus.",
      "(C) The medial two-thirds of the shaft are convex anteriorly.",
      "(D) The clavicle transmits shock from the upper limb to the axial skeleton.",
      "(E) The clavicle is a \"long bone\" that has no medullary cavity."
    ],
    "correct": "(B) Its lateral end is flat where it articulates with the humerus.",
    "marks": 1
  },
  {
    "id": 2,
    "type": "mcq",
    "text": "The trapezius attaches to which of the following regions of the clavicle?",
    "options": [
      "(A) lateral one-third of the clavicle",
      "(B) conoid tubercle",
      "(C) subclavian groove",
      "(D) trapezoid line",
      "(E) quadrangular tubercle"
    ],
    "correct": "(A) lateral one-third of the clavicle",
    "marks": 1
  },
  {
    "id": 3,
    "type": "mcq",
    "text": "Which of the following is true in respect to the scapula?",
    "options": [
      "(A) The spine of the scapula continues laterally as the coracoid process.",
      "(B) The lateral surface of the scapula forms the glenoid cavity.",
      "(C) The acromion is superior to the glenoid cavity and projects anterolaterally.",
      "(D) The scapula is fastened securely to the thoracic cage at the scapulothoracic joint.",
      "(E) The acromioclavicular joint represents the true shoulder joint."
    ],
    "correct": "(B) The lateral surface of the scapula forms the glenoid cavity.",
    "marks": 1
  },
  {
    "id": 4,
    "type": "mcq",
    "text": "Which of the following is NOT included in the condyle of the humerus?",
    "options": [
      "(A) radial, coronoid, and olecranon fossae",
      "(B) epicondyles",
      "(C) trochlea",
      "(D) capitulum",
      "(E) greater tubercle"
    ],
    "correct": "(E) greater tubercle",
    "marks": 1
  },
  {
    "id": 5,
    "type": "mcq",
    "text": "Which of the following is NOT true in respect to the ulna and radius?",
    "options": [
      "(A) The brachialis attaches to the tuberosity of the ulna.",
      "(B) The ulnar styloid process is much larger than the radial styloid process and extends farther distally.",
      "(C) The head of the ulna lies distally, whereas the head of the radius articulates with the humerus.",
      "(D) The ulna is medial to the radius in the anatomical position.",
      "(E) The bodies of these bones are firmly bound together by the interosseous membrane."
    ],
    "correct": "(B) The ulnar styloid process is much larger than the radial styloid process and extends farther distally.",
    "marks": 1
  },
  {
    "id": 6,
    "type": "mcq",
    "text": "Which of the following is true regarding the carpus?",
    "options": [
      "(A) The scaphoid articulates proximally with the ulna and has a tubercle.",
      "(B) The lunate articulates with the ulna and is broader anteriorly than posteriorly.",
      "(C) The triquetrum articulates proximally with the articular disc of the distal radioulnar joint.",
      "(D) The pisiform lies on the palmar surface of the trapezium.",
      "(E) It is composed of seven bones."
    ],
    "correct": "(C) The triquetrum articulates proximally with the articular disc of the distal radioulnar joint.",
    "marks": 1
  },
  {
    "id": 7,
    "type": "mcq",
    "text": "Which of the following describes the correct order of the distal row of carpals from lateral to medial?",
    "options": [
      "(A) triquetrum, trapezoid, capitate, hamate",
      "(B) trapezoid, trapezium, capitate, hamate",
      "(C) trapezium, trapezoid, capitate, hamate",
      "(D) trapezium, triquetrum, capitate, hamate",
      "(E) scaphoid, lunate, triquetrum, pisiform"
    ],
    "correct": "(C) trapezium, trapezoid, capitate, hamate",
    "marks": 1
  },
  {
    "id": 8,
    "type": "mcq",
    "text": "Which of the following is actually a lateral cutaneous branch of an intercostal nerve, innervating the skin of the medial surface of the arm?",
    "options": [
      "(A) intercostobrachial nerve",
      "(B) superior lateral cutaneous nerve of the arm",
      "(C) inferior lateral cutaneous nerve of the arm",
      "(D) medial cutaneous nerve of the arm",
      "(E) lateral pectoral nerve"
    ],
    "correct": "(A) intercostobrachial nerve",
    "marks": 1
  },
  {
    "id": 9,
    "type": "mcq",
    "text": "Which of the following is NOT a branch of the radial nerve?",
    "options": [
      "(A) posterior cutaneous nerve of the arm",
      "(B) posterior cutaneous nerve of the forearm",
      "(C) inferior lateral cutaneous nerve of the arm",
      "(D) superior lateral cutaneous nerve of the arm",
      "(E) posterior interosseous nerve"
    ],
    "correct": "(D) superior lateral cutaneous nerve of the arm",
    "marks": 1
  },
  {
    "id": 10,
    "type": "mcq",
    "text": "Which of the following is NOT an anterior thoracoappendicular muscle?",
    "options": [
      "(A) pectoralis major",
      "(B) pectoralis minor",
      "(C) deltoid",
      "(D) subclavius",
      "(E) serratus anterior"
    ],
    "correct": "(C) deltoid",
    "marks": 1
  },
  {
    "id": 11,
    "type": "mcq",
    "text": "Which of the following best describes the action of the pectoralis minor?",
    "options": [
      "(A) stabilizes scapula by drawing it inferiorly and anteriorly against thoracic wall",
      "(B) anchors and depresses clavicle",
      "(C) adducts and medially rotates humerus",
      "(D) rotates scapula",
      "(E) flexes humerus"
    ],
    "correct": "(A) stabilizes scapula by drawing it inferiorly and anteriorly against thoracic wall",
    "marks": 1
  },
  {
    "id": 12,
    "type": "mcq",
    "text": "Which of the following muscles attaches to the coracoid process of the scapula?",
    "options": [
      "(A) pectoralis minor",
      "(B) triceps brachii",
      "(C) brachialis",
      "(D) pectoralis major",
      "(E) subclavius"
    ],
    "correct": "(A) pectoralis minor",
    "marks": 1
  },
  {
    "id": 13,
    "type": "mcq",
    "text": "All of the following are medial rotators of the arm EXCEPT",
    "options": [
      "(A) latissimus dorsi",
      "(B) teres major",
      "(C) subscapularis",
      "(D) infraspinatus",
      "(E) anterior part of deltoid"
    ],
    "correct": "(D) infraspinatus",
    "marks": 1
  },
  {
    "id": 14,
    "type": "mcq",
    "text": "What muscles are necessary to raise the arm above the shoulder?",
    "options": [
      "(A) first the supraspinatus, next the deltoid, and then the serratus anterior",
      "(B) first the deltoid, next the supraspinatus, and then the serratus anterior",
      "(C) first the supraspinatus, next the serratus anterior, and then the deltoid",
      "(D) first the serratus anterior, next the deltoid, and then the supraspinatus",
      "(E) first the deltoid, next the serratus anterior, and then supraspinatus"
    ],
    "correct": "(A) first the supraspinatus, next the deltoid, and then the serratus anterior",
    "marks": 1
  },
  {
    "id": 15,
    "type": "mcq",
    "text": "Which of the following is innervated by the dorsal scapular nerve?",
    "options": [
      "(A) serratus anterior",
      "(B) rhomboid major and minor",
      "(C) erector spinae",
      "(D) subscapularis",
      "(E) supraspinatus"
    ],
    "correct": "(B) rhomboid major and minor",
    "marks": 1
  },
  {
    "id": 16,
    "type": "mcq",
    "text": "Which of the following is an extrinsic shoulder muscle?",
    "options": [
      "(A) deltoid",
      "(B) teres major",
      "(C) levator scapulae",
      "(D) teres minor",
      "(E) supraspinatus"
    ],
    "correct": "(C) levator scapulae",
    "marks": 1
  },
  {
    "id": 17,
    "type": "mcq",
    "text": "Which of the following is true in respect to the trapezius?",
    "options": [
      "(A) It is innervated by the dorsal scapular nerve.",
      "(B) Its superior fibers retract the scapula.",
      "(C) Its middle fibers elevate the scapula.",
      "(D) Its inferior fibers retract the scapula.",
      "(E) Its superior and inferior fibers act together in rotating the scapula on the thoracic wall."
    ],
    "correct": "(E) Its superior and inferior fibers act together in rotating the scapula on the thoracic wall.",
    "marks": 1
  },
  {
    "id": 18,
    "type": "mcq",
    "text": "A patient is asked to place the hands posteriorly on the hips and to push the elbows posteriorly against resistance. Which muscle is being tested?",
    "options": [
      "(A) levator scapulae",
      "(B) rhomboid",
      "(C) trapezius",
      "(D) latissimus dorsi",
      "(E) serratus anterior"
    ],
    "correct": "(B) rhomboid",
    "marks": 1
  },
  {
    "id": 19,
    "type": "mcq",
    "text": "Which rotator cuff muscle does NOT rotate the humerus?",
    "options": [
      "(A) supraspinatus",
      "(B) infraspinatus",
      "(C) teres minor",
      "(D) subscapularis",
      "(E) teres major"
    ],
    "correct": "(A) supraspinatus",
    "marks": 1
  },
  {
    "id": 20,
    "type": "mcq",
    "text": "The axillary nerve innervates which of the following muscles?",
    "options": [
      "(A) coracobrachialis",
      "(B) teres minor",
      "(C) teres major",
      "(D) subscapularis",
      "(E) levator scapulae"
    ],
    "correct": "(B) teres minor",
    "marks": 1
  },
  {
    "id": 21,
    "type": "mcq",
    "text": "Which of the following is NOT contained in the axilla?",
    "options": [
      "(A) axillary blood vessels",
      "(B) lymph nodes",
      "(C) trunks and divisions of the brachial plexus",
      "(D) axillary nerve",
      "(E) lymph nodes"

    const PAGE_SIZE = 20;
    const testId = "upper_limb_anatomy";
    let currentPage = 1;
    let answers = {};
    let isSubmitted = false;

    // ── Core Logic ──

    function init() {
      loadProgress();
      renderPage(1);
      setupEventListeners();
      updateProgress();
    }

    function renderPage(pageNumber) {
      currentPage = pageNumber;
      const start = (pageNumber - 1) * PAGE_SIZE;
      const end = start + PAGE_SIZE;
      const pageQuestions = questions.slice(start, end);

      const container = document.getElementById('questions-container');
      container.innerHTML = '';

      pageQuestions.forEach(q => {
        const card = createQuestionCard(q);
        container.appendChild(card);
      });

      updatePagination();
      window.scrollTo(0, 0);
    }

    function createQuestionCard(q) {
      const card = document.createElement('div');
      card.className = 'question-card';
      card.id = `q-${q.id}`;

      const header = `
        <div class="type-label type-${q.type}">${q.type}</div>
        <div class="question-header">
          <div class="question-text"><strong>${q.id}.</strong> ${q.text}</div>
          <div class="marks-badge">${q.marks} Marks</div>
        </div>
      `;

      let body = '';
      if (q.type === 'mcq') {
        body = `<div class="options">` + 
          q.options.map((opt, idx) => {
            const isSelected = answers[q.id] === opt;
            const name = `q${q.id}`;
            const optId = `q${q.id}opt${idx}`;
            
            let extraClass = '';
            if (isSubmitted && q.correct) {
                if (opt === q.correct) extraClass = 'opt-correct';
                else if (isSelected) extraClass = 'opt-wrong';
            }

            return `
              <label class="option-label ${extraClass}" for="${optId}">
                <input type="radio" name="${name}" id="${optId}" value="${opt}" 
                  ${isSelected ? 'checked' : ''} ${isSubmitted ? 'disabled' : ''}>
                <span>${opt}</span>
              </label>
            `;
          }).join('') + `</div>`;
      } else {
        const val = answers[q.id] || '';
        body = q.type === 'short' 
          ? `<input type="text" class="short-input" value="${val}" ${isSubmitted ? 'disabled' : ''} placeholder="Your answer...">`
          : `<textarea class="essay-input" ${isSubmitted ? 'disabled' : ''} placeholder="Write your response...">${val}</textarea>`;
      }

      card.innerHTML = header + body;

      // Event listeners for inputs
      if (!isSubmitted) {
        card.querySelectorAll('input, textarea').forEach(input => {
          input.addEventListener('change', (e) => {
            answers[q.id] = e.target.value;
            saveProgress();
            updateProgress();
          });
        });
      }

      return card;
    }

    function updatePagination() {
      const totalPages = Math.ceil(questions.length / PAGE_SIZE);
      document.getElementById('page-indicator').textContent = `Page ${currentPage} of ${totalPages}`;
      document.getElementById('btn-prev').disabled = currentPage === 1;
      document.getElementById('btn-next').disabled = currentPage === totalPages;
      document.getElementById('pagination-bar').style.display = totalPages > 1 ? 'flex' : 'none';
    }

    function updateProgress() {
      const total = questions.length;
      const answered = Object.keys(answers).length;
      const percent = (answered / total) * 100;
      
      document.getElementById('progress-label').textContent = `${answered} / ${total} answered`;
      document.getElementById('progress-fill').style.width = `${percent}%`;
    }

    function saveProgress() {
      localStorage.setItem(`medtest_answers_${testId}`, JSON.stringify(answers));
      showToast();
    }

    function loadProgress() {
      const saved = localStorage.getItem(`medtest_answers_${testId}`);
      if (saved) answers = JSON.parse(saved);
      
      const submitted = localStorage.getItem(`medtest_submitted_${testId}`);
      if (submitted === 'true') {
        isSubmitted = true;
        document.getElementById('btn-submit').disabled = true;
        document.getElementById('btn-retake').style.display = 'block';
        showReviewBanner();
      }
    }

    function showToast() {
      const toast = document.getElementById('save-toast');
      toast.classList.add('visible');
      setTimeout(() => toast.classList.remove('visible'), 1500);
    }

    function setupEventListeners() {
      document.getElementById('btn-prev').addEventListener('click', () => {
        if (currentPage > 1) renderPage(currentPage - 1);
      });
      document.getElementById('btn-next').addEventListener('click', () => {
        const totalPages = Math.ceil(questions.length / PAGE_SIZE);
        if (currentPage < totalPages) renderPage(currentPage + 1);
      });
      document.getElementById('btn-submit').addEventListener('click', submitTest);
      document.getElementById('btn-retake').addEventListener('click', retakeTest);
      document.getElementById('btn-save-session').addEventListener('click', saveSession);
      document.getElementById('btn-load-session').addEventListener('click', toggleSessionPanel);
    }

    function submitTest() {
      if (!confirm('Are you sure you want to submit? This will lock your answers.')) return;
      
      isSubmitted = true;
      localStorage.setItem(`medtest_submitted_${testId}`, 'true');
      document.getElementById('btn-submit').disabled = true;
      document.getElementById('btn-retake').style.display = 'block';
      
      showReviewBanner();
      renderPage(currentPage); // Re-render to show highlights
    }

    function showReviewBanner() {
      const total = questions.length;
      const answered = Object.keys(answers).length;
      
      const banner = document.createElement('div');
      banner.className = 'review-banner';
      banner.innerHTML = `
        <strong>Test Submitted</strong>
        Review your performance below. Correct answers are highlighted in green.
        <p>${answered} of ${total} questions attempted.</p>
      `;
      
      const container = document.getElementById('review-banner-container');
      container.innerHTML = '';
      container.appendChild(banner);
    }

    function retakeTest() {
      if (!confirm('Clear all answers and retake?')) return;
      
      answers = {};
      isSubmitted = false;
      localStorage.removeItem(`medtest_answers_${testId}`);
      localStorage.removeItem(`medtest_submitted_${testId}`);
      
      document.getElementById('btn-submit').disabled = false;
      document.getElementById('btn-retake').style.display = 'none';
      document.getElementById('review-banner-container').innerHTML = '';
      
      renderPage(1);
      updateProgress();
    }

    // ── Session Management ──

    function saveSession() {
      const name = prompt('Enter a name for this session:');
      if (!name) return;
      
      const sessions = JSON.parse(localStorage.getItem('medtest_sessions') || '[]');
      sessions.push({
        id: Date.now(),
        testId: testId,
        name: name,
        answers: answers,
        date: new Date().toLocaleDateString()
      });
      localStorage.setItem('medtest_sessions', JSON.stringify(sessions));
      alert('Session saved!');
    }

    function toggleSessionPanel() {
      const panel = document.getElementById('session-panel');
      if (panel.style.display === 'none') {
        renderSessions();
        panel.style.display = 'block';
      } else {
        panel.style.display = 'none';
      }
    }

    function renderSessions() {
      const list = document.getElementById('session-list');
      const sessions = JSON.parse(localStorage.getItem('medtest_sessions') || '[]')
                         .filter(s => s.testId === testId);
      
      if (sessions.length === 0) {
        list.innerHTML = '<p style="font-size: 0.8rem; color: var(--ink-muted);">No saved sessions.</p>';
        return;
      }

      list.innerHTML = sessions.map(s => `
        <div class="session-item" onclick="loadSession(${s.id})">
          <span>${s.name} (${s.date})</span>
          <span style="font-size: 0.7rem; opacity: 0.6;">Click to load</span>
        </div>
      `).join('');
    }

    window.loadSession = function(id) {
      const sessions = JSON.parse(localStorage.getItem('medtest_sessions') || '[]');
      const session = sessions.find(s => s.id === id);
      if (session) {
        answers = session.answers;
        saveProgress();
        renderPage(1);
        updateProgress();
        document.getElementById('session-panel').style.display = 'none';
        alert('Session loaded!');
      }
    };

    init();
  </script>
